server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Forward API calls to the backend container so the whole app is one origin
  # (works over localhost, LAN IP, and an HTTPS tunnel with no cross-origin).
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Single-page app: fall back to index.html so client-side routes
  # (/wallet, /reservation, /machine/:id/qr, …) work on refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
